            type: string
    ProcessRevisionSaveFile:
      required:
      - content
      - type
      type: object
      properties:
        type:
          description: Which resource this file represents
          example: FORM
          allOf:
          - $ref: "#/components/schemas/ProcessResource"
        content:
          type: string
          description: UTF-8 file content stored byte-for-byte. Maximum 1 MiB per
            file.
    ProcessRevisionSaveRequest:
      required:
      - files
      type: object
      properties:
        files:
          maxItems: 7
          minItems: 1
          type: array
          description: Files to persist in this revision; one entry per resource type.
            Submitting multiple files produces a single revision.
          items:
            $ref: "#/components/schemas/ProcessRevisionSaveFile"
        commitMessage:
          maxLength: 1024
          type: string
          description: Optional human-readable note describing the change. Maximum
            1024 characters.
          nullable: true
    ProcessRevisionSaveResponse:
      type: object
      properties:
        files:
          type: array
          description: "One entry per saved file, in the same order as the request,\
            \ with the resulting URI and content hash."
          items:
            $ref: "#/components/schemas/SavedProcessRevision"
        currentConfigRevision:
          type: integer
          description: Revision number persisted on the process record after this
            save. Monotonically increasing.
          format: int32
          example: 7
        revisionToken:
          type: string
          description: Opaque token for optimistic concurrency. Pass as the If-Match
            header value on the next save; the server returns 412 if another save
            committed first.
        savedBy:
          type: string
          description: Username of the caller who performed the save.
