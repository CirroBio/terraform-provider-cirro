      properties:
        projectId:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
    UserSettings:
      required:
      - analysisUpdateNotificationsEnabled
      type: object
      properties:
        analysisUpdateNotificationsEnabled:
          type: boolean
      additionalProperties: true
      description: Additional settings for the user
    ValidateFileNamePatternsRequest:
      required:
      - fileNamePatterns
      - fileNames
      type: object
      properties:
        fileNames:
          type: array
          items:
            type: string
        fileNamePatterns:
          type: array
          items:
            type: string
    ValidateFileRequirementsRequest:
      required:
      - fileNames
