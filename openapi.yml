            if running
          format: int32
    PrincipalType:
      type: string
      enum:
      - DELEGATED
      - USER
      - SYSTEM
    Process:
      required:
      - allowMultipleSources
      - childProcessIds
      - dataType
      - description
      - executor
      - id
      - isArchived
      - isTenantWide
      - linkedProjectIds
      - name
      - parentProcessIds
      - tags
      - usesSampleSheet
      type: object
      properties:
        id:
          minLength: 1
          type: string
          description: Unique ID of the Process
          example: process-hutch-magic_flute-1_0
        name:
          minLength: 1
          type: string
          description: Friendly name for the process
          example: MAGeCK Flute
        description:
          minLength: 1
          type: string
          description: Description of the process
          example: MAGeCK Flute enables accurate identification of essential genes
            with their related biological functions
        dataType:
          minLength: 1
          type: string
          description: "Name of the data type this pipeline produces (if it is not\
            \ defined, use the name)"
        executor:
          $ref: "#/components/schemas/Executor"
        category:
          type: string
          description: Category of the process
          example: Microbial Analysis
        pipelineType:
          type: string
          description: Type of pipeline
          example: nf-core
        documentationUrl:
          type: string
          description: Link to process documentation
          example: https://docs.cirro.bio/pipelines/catalog_targeted_sequencing/#crispr-screen-analysis
        fileRequirementsMessage:
          type: string
          description: Description of the files to be uploaded (optional)
        childProcessIds:
          type: array
          description: IDs of pipelines that can be run downstream
          items:
            type: string
        parentProcessIds:
          type: array
          description: IDs of processes that can run this pipeline
          items:
            type: string
        owner:
          type: string
          description: Username of the pipeline creator (blank if Cirro curated)
          nullable: true
        linkedProjectIds:
          type: array
          description: Projects that can run this process
          items:
            type: string
        isTenantWide:
          type: boolean
          description: Whether the process is shared with the tenant
        allowMultipleSources:
          type: boolean
          description: Whether the pipeline is allowed to have multiple dataset sources
        usesSampleSheet:
          type: boolean
          description: Whether the pipeline uses the Cirro-provided sample sheet
        isArchived:
          type: boolean
          description: Whether the process is marked as archived
        createdAt:
          type: string
          description: When the process was created (does not reflect the pipeline
            code)
          format: date-time
        updatedAt:
          type: string
          description: When the process was updated (does not reflect the pipeline
            code)
          format: date-time
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
      description: Identifies a data type or pipeline in Cirro
