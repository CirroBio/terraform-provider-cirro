      type: object
      properties:
        fileNames:
          type: array
          items:
            type: string
        sampleSheet:
          type: string
    VersionSpecification:
      required:
      - isDefault
      - isLatest
      - version
      type: object
      properties:
        version:
          type: string
        isDefault:
          type: boolean
        isLatest:
          type: boolean
    Workspace:
      required:
      - computeConfig
      - createdAt
      - createdBy
      - description
      - environmentId
      - id
      - mountedDatasets
      - name
      - projectId
      - sharingType
      - status
      - statusMessage
      - updatedAt
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        projectId:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        statusMessage:
          type: string
        environmentId:
          type: string
        mountedDatasets:
          type: array
          items:
            $ref: "#/components/schemas/MountedDataset"
        computeConfig:
          $ref: "#/components/schemas/WorkspaceComputeConfig"
        sharingType:
          $ref: "#/components/schemas/SharingType"
        autoStopTimeout:
          type: integer
          format: int32
          nullable: true
        sessions:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/WorkspaceSession"
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        autoStopTime:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    WorkspaceComputeConfig:
      required:
      - containerImageUri
      type: object
      properties:
        containerImageUri:
          maxLength: 500
          minLength: 3
          type: string
          description: "Fully qualified container image URI (including registry, repository,\
            \ and tag)."
        cpu:
          maximum: 192
          minimum: 2
          type: integer
          description: Number of vCPU cores allocated to the workspace.
          format: int32
          example: 4
        memoryGiB:
          maximum: 2048
          minimum: 2
          type: integer
          description: Memory allocated to the workspace container in GiB.
          format: int32
          example: 8
        volumeSizeGiB:
          maximum: 500
          minimum: 10
          type: integer
          description: Persistent storage volume size allocated to the workspace in
            GiB.
          format: int32
          example: 50
        gpu:
          type: integer
          description: Number of GPUs allocated to the workspace
          format: int32
          example: 1
        gpuModel:
          pattern: T4|V100|A100
          type: string
          description: "NVIDIA GPU model. When null, AWS selects from any available\
            \ GPU instance family."
          nullable: true
          example: T4
          x-pattern-message: "must be one of [T4, V100, A100]"
        environmentVariables:
          type: object
          additionalProperties:
            type: string
          description: Map of environment variables injected into the container at
            runtime. Keys must be non-blank.
          nullable: true
          example:
            ENV_MODE: production
            LOG_LEVEL: debug
        localPort:
          maximum: 65535
          minimum: 1
          type: integer
          description: User-facing web server port (http).
          format: int32
          example: 8080
        customTaskRoleArn:
          maxLength: 512
          pattern: "^(arn:aws[-a-z]*:iam::\\d{12}:role/)?(?:.+/)?Cirro-CustomWorkspaceTaskRole-[^/]+$"
          type: string
          description: "Custom IAM task role for the workspace ECS task. Provide either\
            \ a role name (e.g., 'Cirro-CustomWorkspaceTaskRole-{projectShortCode}-{name}')\
            \ or a full ARN (e.g., 'arn:aws:iam::{accountId}:role/Cirro-CustomWorkspaceTaskRole-{projectShortCode}-{name}').\
            \ Must belong to the project's AWS account."
          nullable: true
          x-pattern-message: Must be a role name like 'Cirro-CustomWorkspaceTaskRole-<shortCode>-<name>'
            or a full ARN like 'arn:aws:iam::<account-id>:role/Cirro-CustomWorkspaceTaskRole-<shortCode>-<name>'
      description: Configuration parameters for a containerized workspace compute
        environment.
    WorkspaceConnectionResponse:
      required:
      - connectionUrl
      - expiresAt
      - message
      type: object
      properties:
        connectionUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
        message:
          type: string
    WorkspaceEnvironment:
      required:
      - category
      - defaultComputeConfig
      - description
      - id
      - name
      - owner
      - versions
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        defaultComputeConfig:
          $ref: "#/components/schemas/WorkspaceComputeConfig"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/VersionSpecification"
        owner:
          type: string
    WorkspaceInput:
      required:
      - computeConfig
      - mountedDatasets
      - name
      - sharingType
      type: object
      properties:
        name:
          maxLength: 100
          minLength: 3
          pattern: "^\\w[\\w ().'&@!#-/]*$"
          type: string
          description: Name of the workspace.
          example: my-workspace
          x-pattern-message: "Invalid name, must start with alphanumeric and include\
            \ only alphanumeric characters, spaces, and .&-@!#'()/"
        description:
          maxLength: 1000
          type: string
          description: Description of the workspace.
        mountedDatasets:
          maxItems: 100
          type: array
          description: List of datasets to mount into the workspace.
          items:
            $ref: "#/components/schemas/MountedDataset"
        environmentId:
          type: string
          description: ID of the predefined workspace environment to use.
          nullable: true
        computeConfig:
          $ref: "#/components/schemas/WorkspaceComputeConfig"
        sharingType:
          description: Sharing mode of the workspace.
          example: PRIVATE
          allOf:
          - $ref: "#/components/schemas/SharingType"
        autoStopTimeout:
          maximum: 720
          minimum: 1
          type: integer
          description: Time period (in hours) to automatically stop the workspace
            if running
          format: int32
          nullable: true
    WorkspaceSession:
      required:
      - createdAt
      - id
      - user
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        createdAt:
          type: string
          format: date-time
    ColumnDataType:
      type: string
      description: Column data type.
      enum:
      - STRING
      - INTEGER
      - BIGINT
      - FLOAT
      - DOUBLE
      - BOOLEAN
      - DATE
      - TIMESTAMP
    ColumnDef:
      required:
      - dataType
      - name
      type: object
      properties:
        id:
          type: string
          nullable: true
        name:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          x-pattern-message: Must be a valid SQL identifier
        dataType:
          $ref: "#/components/schemas/ColumnDataType"
        displayName:
          type: string
          description: Name displayed on UI.
          nullable: true
        hidden:
          type: boolean
          description: Whether the column is hidden on the UI.
          default: false
        semanticType:
          description: The semantic type of the column.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/SemanticColumnType"
          default: STANDARD
        allowedValues:
          type: array
          description: "The allowed values for the column, only used for ENUM* types."
          nullable: true
          items:
            type: string
        description:
          type: string
          nullable: true
        foreignKey:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/ForeignKeyRef"
        required:
          type: boolean
          description: Whether the column is required to be non-null.
          default: false
    DeleteRowsRequest:
      required:
      - rowIds
      type: object
      properties:
        rowIds:
          maxItems: 10000
          minItems: 1
          type: array
          description: Set of _row_id(s) to delete. Must be non-empty and <= 10000
          items:
            type: integer
            format: int64
    FileDef:
      required:
      - fileType
      - storageUri
      type: object
      properties:
        fileType:
          $ref: "#/components/schemas/FileType"
        storageUri:
          minLength: 1
          pattern: "^s3://[a-zA-Z0-9._/-]+$"
          type: string
          description: Full S3 URI to the source file.
          x-pattern-message: Invalid storageUri
    FileType:
      type: string
      enum:
      - PARQUET
      - CSV
      - JSON
      - XLSX
    Filter:
      type: object
      properties:
        logicalOperator:
          description: Set for group nodes to combine child conditions
          nullable: true
          allOf:
          - $ref: "#/components/schemas/LogicalOperator"
        conditions:
          type: array
          description: Child filter nodes (for group nodes)
          nullable: true
          items:
            $ref: "#/components/schemas/Filter"
        column:
          type: string
          description: "Column reference (for leaf nodes). For view filters, must\
            \ be in alias.column format (e.g., 's1.age'). For sheet data filters,\
            \ must be a bare column name (e.g., 'age')."
          nullable: true
          example: age
        operator:
          description: Comparison operator (for leaf nodes)
          nullable: true
          allOf:
          - $ref: "#/components/schemas/FilterOperator"
        values:
          type: array
          description: "Values for the filter. Single-element list for comparison\
            \ operators (EQUALS, GREATER_THAN, etc.), multi-element for IN/NOT_IN.\
            \ Null or empty for IS_NULL/IS_NOT_NULL."
          nullable: true
          items:
            oneOf:
            - type: string
            - type: integer
              format: int32
            - type: number
              format: double
            - type: boolean
      description: "A filter node: either a group (with logicalOperator and conditions)\
        \ or a leaf condition (with column, operator, and values)"
    FilterOperator:
      type: string
      description: Comparison operator (for leaf nodes)
      enum:
      - EQUALS
      - NOT_EQUALS
      - GREATER_THAN
      - GREATER_THAN_OR_EQUALS
      - LESS_THAN
      - LESS_THAN_OR_EQUALS
      - IN
      - NOT_IN
      - LIKE
      - NOT_LIKE
      - IS_NULL
      - IS_NOT_NULL
    ForeignKeyRef:
      required:
      - columnName
      - sheetId
      type: object
      properties:
        sheetId:
          minLength: 1
          type: string
        columnName:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          x-pattern-message: Must be a valid SQL identifier
    InsertRowsRequest:
      required:
      - inserts
      type: object
      properties:
        inserts:
          maxItems: 1000
          minItems: 1
          type: array
          description: List of rows to update.
          items:
            $ref: "#/components/schemas/RowInsert"
    JoinCondition:
      required:
      - leftColumn
      - rightColumn
      type: object
      properties:
        leftColumn:
          minLength: 1
          type: string
          description: Qualified column reference in alias.column format
          example: s1.patient_id
        rightColumn:
          minLength: 1
          type: string
          description: Qualified column reference in alias.column format
          example: s2.patient_id
    JoinType:
      type: string
      enum:
      - INNER
      - LEFT
      - RIGHT
      - FULL
    LogicalOperator:
      type: string
      description: Set for group nodes to combine child conditions
      enum:
      - AND
      - OR
    QueryColumn:
      required:
      - dataType
      - name
      type: object
      properties:
        name:
          type: string
          description: Column name.
        dataType:
          description: Column data type.
          allOf:
          - $ref: "#/components/schemas/ColumnDataType"
      description: A column in a sheet query result.
    RawViewQueryRequest:
      required:
      - query
      type: object
      properties:
        query:
          minLength: 1
          type: string
        viewType:
          type: string
    RowInsert:
      required:
      - values
      type: object
      properties:
        values:
          minProperties: 1
          type: object
          additionalProperties:
            type: object
          description: Column name and value. Any missing columns will have a null
            value (will error if column is required).
          example:
            icd_code: G65
    RowUpdate:
      required:
      - rowId
      - values
      type: object
      properties:
        rowId:
          type: integer
          description: "_row_id, which serves as the primary key to identify the row."
          format: int64
          example: 42
        values:
          minProperties: 1
          type: object
          additionalProperties:
            type: object
          description: Column name and new value. Only the columns included here are
            updated; all other columns on the row are left unchanged. At least one
            entry is required.
          example:
            icd_code: G65
    SemanticColumnType:
      type: string
      description: The semantic type of the column.
      enum:
      - STANDARD
      - ENTITY_NAME
      - ENTITY_KEY
      - ENUM_SINGLE
      - ENUM_MULTI
      - URL
      - FILE_LINK
      - DATASET_LINK
      - FOREIGN_KEY
      default: STANDARD
    Sheet:
      required:
      - createdAt
      - createdBy
      - description
      - id
      - name
      - namespaceName
      - projectId
      - sheetCreationMode
      - sheetType
      - status
      - tableName
      - tags
      - totalRowCount
      - updatedAt
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        namespaceName:
          type: string
        tableName:
          type: string
        description:
          type: string
        projectId:
          type: string
        sheetType:
          $ref: "#/components/schemas/SheetType"
        sheetCreationMode:
          $ref: "#/components/schemas/SheetCreationMode"
        status:
          $ref: "#/components/schemas/Status"
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        totalRowCount:
          type: integer
          format: int64
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
    SheetCreationMode:
      type: string
      enum:
      - FILE
      - SCRATCH
      - TEMPLATE
      - STANDARD
    SheetDataRequest:
      type: object
      properties:
        limit:
          maximum: 10000
          minimum: 1
          type: integer
          description: Maximum rows to return
          format: int32
          nullable: true
          default: 1000
        page:
          minimum: 1
          type: integer
          description: Page to return
          format: int32
          nullable: true
          default: 1
        sort:
          description: Sort by column and direction.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/SheetSort"
        filter:
          description: Filter tree.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/Filter"
      description: Paginated sheet data query with optional sort and filter
    SheetDataUpdateResponse:
      required:
      - rowsAffected
      type: object
      properties:
        rowsAffected:
          type: integer
          format: int32
    SheetDetail:
      required:
      - auditReadAccess
      - createdAt
      - createdBy
      - description
      - id
      - name
      - namespaceName
      - projectId
      - sheetType
      - status
      - tableName
      - tags
      - totalRowCount
      - updatedAt
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        projectId:
          type: string
        namespaceName:
          type: string
        tableName:
          type: string
        sheetType:
          $ref: "#/components/schemas/SheetType"
        sheetCreationMode:
          description: How the table was initialized. Null for VIEW sheets.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/SheetCreationMode"
        status:
          $ref: "#/components/schemas/Status"
        columns:
          type: array
          description: Column definitions for the table schema. Null for VIEW sheets.
          nullable: true
          items:
            $ref: "#/components/schemas/ColumnDef"
        auditReadAccess:
          type: boolean
        viewDefinition:
          description: View definition for VIEW sheets. Null for TABLE sheets.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/ViewQueryRequest"
        lastRefreshedAt:
          type: string
          description: When the view was last materialized. Null for TABLE sheets.
          format: date-time
          nullable: true
        stagingUploadPath:
          type: string
          description: S3 upload path for files to be ingested into this sheet.
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        totalRowCount:
          type: integer
          format: int64
        schemaVersionId:
          type: integer
          description: "Current table schema version (starts at 0). Used for optimistic\
            \ concurrency control. New tables can omit this, but updates should include\
            \ this to prevent overwriting due to stale table schema metadata."
          format: int32
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
    SheetIngestRequest:
      required:
      - fileDef
      type: object
      properties:
        fileDef:
          $ref: "#/components/schemas/FileDef"
        sourceColumns:
          minItems: 1
          type: array
          description: "List of file column to sheet column mapping. If null, requires\
            \ the column headers to match the sheet column names."
          nullable: true
          items:
            $ref: "#/components/schemas/SourceColumn"
    SheetInput:
      type: object
      discriminator:
        propertyName: sheetType
        mapping:
          TABLE: "#/components/schemas/TableSheetInput"
          VIEW: "#/components/schemas/ViewSheetInput"
      oneOf:
      - $ref: "#/components/schemas/TableSheetInput"
      - $ref: "#/components/schemas/ViewSheetInput"
    SheetJob:
      required:
      - createdAt
      - id
      - jobType
      - sheetId
      - status
      - updatedAt
      type: object
      properties:
        id:
          type: string
        sheetId:
          type: string
        jobType:
          $ref: "#/components/schemas/SheetJobType"
        status:
          $ref: "#/components/schemas/Status"
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        failedAtStep:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        snapshotId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SheetJobType:
      type: string
      enum:
      - CREATE_TABLE
      - INGEST
      - DROP_TABLE
      - MATERIALIZE_VIEW
      - UPDATE_SCHEMA
    SheetQueryRequest:
      required:
      - namespaceName
      - query
      type: object
      properties:
        namespaceName:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          description: Namespace containing the sheets to query.
          example: default
          x-pattern-message: Must be a valid SQL identifier
        query:
          minLength: 1
          type: string
          description: Raw SQL query to run.
        limit:
          maximum: 10000
          minimum: 1
          type: integer
          description: Maximum rows to return
          format: int32
          nullable: true
          default: 1000
        page:
          minimum: 1
          type: integer
          description: Page to return
          format: int32
          nullable: true
          default: 1
    SheetQueryResponse:
      required:
      - columns
      - rows
      - totalRowCount
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/QueryColumn"
        rows:
          type: array
          items:
            type: array
            items:
              type: object
        totalRowCount:
          type: integer
          format: int64
    SheetSort:
      type: object
      properties:
        orderBy:
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          description: Column to sort by.
          nullable: true
          x-pattern-message: Must be a valid SQL identifier
        order:
          description: Sort direction.
          nullable: true
          allOf:
          - $ref: "#/components/schemas/SqlSortOrder"
          default: ASC
      description: Column and direction for sorting sheet data results.
    SheetType:
      type: string
      enum:
      - TABLE
      - VIEW
    SheetUpdateResponse:
      type: object
      properties:
        sheet:
          description: "Updated sheet state after the PUT completes. For dry-run,\
            \ reflects the current (unchanged) state."
          allOf:
          - $ref: "#/components/schemas/SheetDetail"
        sqlStatements:
          type: array
          description: SQL DDL statements applied (TABLE schema changes) or that WOULD
            be applied (dryRun). Empty for metadata-only updates and for VIEW updates.
          items:
            type: string
        changes:
          type: array
          description: Human-readable summary of the changes applied (or that would
            be applied for dryRun). Suitable for showing to users unfamiliar with
            SQL. Empty for metadata-only and VIEW updates.
          items:
            type: string
    SourceColumn:
      required:
      - sheetColumn
      type: object
      properties:
        fileColumn:
          pattern: "^[^\\p{Cntrl}\"]{1,127}$"
          type: string
          description: "File column header name. Use this OR index, not both."
          nullable: true
          x-pattern-message: Must not contain control characters or double quotes.
        index:
          minimum: 0
          type: integer
          description: "0-based file column position. Use this OR fileColumn, not\
            \ both."
          format: int32
          nullable: true
        sheetColumn:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          x-pattern-message: Must be a valid SQL identifier
    SqlSortOrder:
      type: string
      enum:
      - ASC
      - DESC
    StructuredViewQueryRequest:
      required:
      - sheets
      type: object
      properties:
        sheets:
          minItems: 1
          type: array
          description: "Sheets to include in the view. The first entry (sheets[0])\
            \ is the primary sheet — it becomes the FROM clause of the generated SQL.\
            \ Subsequent entries are brought in via joins."
          items:
            $ref: "#/components/schemas/ViewSheetRef"
        joins:
          type: array
          description: Join definitions between sheets
          nullable: true
          items:
            $ref: "#/components/schemas/ViewJoin"
        columns:
          type: array
          description: "Columns to select in alias.column format. If null, selects\
            \ all columns."
          nullable: true
          items:
            type: string
        filter:
          description: Filter conditions to apply
          nullable: true
          allOf:
          - $ref: "#/components/schemas/Filter"
        viewType:
          type: string
      description: Request for a view joining one or more sheets with optional column
        selection and filtering
    TableSheetInput:
      required:
      - columns
      - name
      - namespaceName
      - sheetCreationMode
      - tableName
      type: object
      properties:
        name:
          maxLength: 100
          minLength: 1
          type: string
          description: Display name for the sheet
        description:
          type: string
          description: Optional description of the sheet's purpose or contents
          nullable: true
        namespaceName:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          description: Namespace containing the sheet's underlying table. Immutable
            after create.
          example: alz_cohort
          x-pattern-message: Must be a valid SQL identifier
        tableName:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          description: Name of the sheet's underlying table. Mutable via update.
          example: my_table
          x-pattern-message: Must be a valid SQL identifier
        auditReadAccess:
          type: boolean
          description: Enable audit logging for read access to this sheet
          default: false
        sheetCreationMode:
          description: How the table was initialized. Immutable after create.
          allOf:
          - $ref: "#/components/schemas/SheetCreationMode"
        columns:
          minItems: 1
          type: array
          description: "Target column list for the sheet. On update, the server computes\
            \ the diff against existing columns (matched by column id) and applies\
            \ the resulting ADD/DROP/RENAME/TYPE changes as a single transactional\
            \ ALTER sequence. Existing columns include their id; new columns omit\
            \ it."
          items:
            $ref: "#/components/schemas/ColumnDef"
        schemaVersionId:
          type: integer
          description: "Current table schema version (starts at 0). Used for optimistic\
            \ concurrency control. New tables can omit this, but updates should include\
            \ this to prevent overwriting due to stale table schema metadata."
          format: int32
          nullable: true
        tags:
          type: array
          description: Tags for the sheet
          items:
            $ref: "#/components/schemas/Tag"
        sheetType:
          type: string
    UpdateRowsRequest:
      required:
      - updates
      type: object
      properties:
        updates:
          maxItems: 1000
          minItems: 1
          type: array
          description: List of rows to update.
          items:
            $ref: "#/components/schemas/RowUpdate"
    ViewJoin:
      required:
      - conditions
      - joinType
      type: object
      properties:
        joinType:
          $ref: "#/components/schemas/JoinType"
        conditions:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/JoinCondition"
    ViewQueryRequest:
      type: object
      description: View definition. viewType=STRUCTURED for standard builder; viewType=RAW
        for a SQL SELECT.
      discriminator:
        propertyName: viewType
        mapping:
          STRUCTURED: "#/components/schemas/StructuredViewQueryRequest"
          RAW: "#/components/schemas/RawViewQueryRequest"
      oneOf:
      - $ref: "#/components/schemas/RawViewQueryRequest"
      - $ref: "#/components/schemas/StructuredViewQueryRequest"
    ViewSheetInput:
      required:
      - name
      - namespaceName
      - tableName
      - viewDefinition
      type: object
      properties:
        name:
          maxLength: 100
          minLength: 1
          type: string
          description: Display name for the sheet
        description:
          type: string
          description: Optional description of the sheet's purpose or contents
          nullable: true
        namespaceName:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          description: Namespace containing the sheet's underlying table. Immutable
            after create.
          example: alz_cohort
          x-pattern-message: Must be a valid SQL identifier
        tableName:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          description: Name of the sheet's underlying table. Mutable via update.
          example: my_table
          x-pattern-message: Must be a valid SQL identifier
        auditReadAccess:
          type: boolean
          description: Enable audit logging for read access to this sheet
          default: false
        viewDefinition:
          description: View definition. Replacing this on update triggers data refresh
            (async).
          allOf:
          - $ref: "#/components/schemas/ViewQueryRequest"
        tags:
          type: array
          description: Tags for the sheet
          items:
            $ref: "#/components/schemas/Tag"
        sheetType:
          type: string
    ViewSheetRef:
      required:
      - alias
      - sheetId
      type: object
      properties:
        sheetId:
          minLength: 1
          type: string
        alias:
          minLength: 1
          pattern: "^[a-zA-Z_][a-zA-Z0-9_]{0,127}$"
          type: string
          x-pattern-message: Must be a valid SQL identifier
  securitySchemes:
    accessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
