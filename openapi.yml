openapi: 3.0.1
info:
  title: Cirro Data
  description: Cirro Data Platform service API
  contact:
    name: Cirro
    url: https://cirro.bio
    email: support@cirro.bio
  version: latest
  x-logo:
    url: https://static.cirro.bio/Cirro_Logo_Horizontal_Navy.png
servers:
- url: /api
tags:
- name: audit
  description: Access to audit events
- name: processes
  description: Dataset Types & Pipelines
- name: sharing
  description: Manage dataset shares
- name: dashboards
  description: Used in dashboard feature in the web portal
- name: feed
  description: Activity feed for discussions and other events
- name: workspaces
  description: Manage workspaces (interactive compute environments)
- name: sheets
  description: Manage sheets
paths:
  /agents:
    get:
      tags:
      - compute-environment
      summary: Get agents
      description: Get a list of agents
      operationId: getAgents
      responses:
        "200":
          description: getAgents 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentDetail"
      security:
      - accessToken: []
    post:
      tags:
      - compute-environment
      summary: Create agent
      description: Create a new agent
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
        required: true
      responses:
        "201":
          description: createAgent 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponse"
      security:
      - accessToken: []
  /agents/{agentId}:
    put:
      tags:
      - compute-environment
      summary: Update agent
      description: Update an agent
      operationId: updateAgent
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
        required: true
      responses:
        "200":
          description: updateAgent 200 response
      security:
      - accessToken: []
    delete:
      tags:
      - compute-environment
      summary: Delete agent
      description: Delete an agent
      operationId: deleteAgent
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteAgent 200 response
      security:
      - accessToken: []
  /app-registration-templates:
    get:
      tags:
      - app-registrations
      summary: List app registration templates
      description: Lists pre-defined application templates to register.
      operationId: listAppRegistrationTemplates
      responses:
        "200":
          description: listAppRegistrationTemplates 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppRegistrationTemplate"
      security:
      - accessToken: []
  /app-registrations:
    get:
      tags:
      - app-registrations
      summary: List app registrations
      description: Lists all app registrations in the system.
      operationId: listAppRegistrations
      parameters:
      - name: limit
        in: query
        description: number of records to get
        required: false
        explode: false
        schema:
          type: integer
          format: int32
          default: 100
      - name: nextToken
        in: query
        description: cursor to request the next page
        required: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: listAppRegistrations 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_AppRegistrationDto_"
      security:
      - accessToken: []
    post:
      tags:
      - app-registrations
      summary: Create app registration
      description: Creates a new OAuth client app registration. Returns the client
        secret which is only shown once.
      operationId: createAppRegistration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppRegistrationInput"
        required: true
      responses:
        "201":
          description: createAppRegistration 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRegistrationSecretResponse"
      security:
      - accessToken: []
  /app-registrations/mine:
    get:
      tags:
      - app-registrations
      summary: List my app registrations
      description: Lists app registrations created by the current user.
      operationId: listMyAppRegistrations
      responses:
        "200":
          description: listMyAppRegistrations 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppRegistration"
      security:
      - accessToken: []
  /app-registrations/{id}:
    get:
      tags:
      - app-registrations
      summary: Get app registration
      description: Gets detailed information about an app registration.
      operationId: getAppRegistration
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getAppRegistration 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRegistrationDetail"
      security:
      - accessToken: []
    put:
      tags:
      - app-registrations
      summary: Update app registration
      description: Updates an existing app registration.
      operationId: updateAppRegistration
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppRegistrationInput"
        required: true
      responses:
        "200":
          description: updateAppRegistration 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRegistrationDetail"
      security:
      - accessToken: []
    delete:
      tags:
      - app-registrations
      summary: Archive app registration
      description: Archives an app registration. Archived registrations cannot authenticate.
      operationId: archiveAppRegistration
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: archiveAppRegistration 200 response
      security:
      - accessToken: []
  /app-registrations/{id}:approve:
    post:
      tags:
      - app-registrations
      summary: Approve application
      description: Mark application as approved by an administrator.
      operationId: approveApp
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: approveApp 200 response
      security:
      - accessToken: []
  /app-registrations/{id}:regenerate-secret:
    post:
      tags:
      - app-registrations
      summary: Regenerate client secret
      description: Generates a new client secret for the app registration. The old
        secret is invalidated.
      operationId: regenerateSecret
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: regenerateSecret 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRegistrationSecretResponse"
      security:
      - accessToken: []
  /audit-events:
    get:
      tags:
      - audit
      summary: List audit events
      description: Gets a list of audit events
      operationId: listEvents
      parameters:
      - name: username
        in: query
        description: Username of the user who performed the action
        required: false
        explode: false
        schema:
          type: string
      - name: entityType
        in: query
        description: Type of the entity
        required: false
        explode: false
        schema:
          type: string
          enum:
          - Project
          - Sample
          - Dataset
          - User
          - BillingAccount
          - Process
          - Workspace
          - UserProjectAssignment
      - name: entityId
        in: query
        description: ID of the entity
        required: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: listEvents 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
  /audit-events/{auditEventId}:
    get:
      tags:
      - audit
      summary: Get audit event
      description: Get audit event detailed information
      operationId: getEvent
      parameters:
      - name: auditEventId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getEvent 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
  /billing:
    get:
      tags:
      - billing
      summary: List billing accounts
      description: Gets a list of billing accounts the current user has access to
      operationId: getBillingAccounts
      parameters:
      - name: includeArchived
        in: query
        description: Include billing accounts that are no longer in use
        required: false
        explode: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: getBillingAccounts 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingAccount"
      security:
      - accessToken: []
    post:
      tags:
      - billing
      summary: Create billing account
      description: Creates a billing account
      operationId: createBillingAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingAccountRequest"
        required: true
      responses:
        "201":
          description: createBillingAccount 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponse"
      security:
      - accessToken: []
  /billing/{billingAccountId}:
    put:
      tags:
      - billing
      summary: Update billing account
      description: Updates a billing account
      operationId: updateBillingAccount
      parameters:
      - name: billingAccountId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingAccountRequest"
        required: true
      responses:
        "200":
          description: updateBillingAccount 200 response
      security:
      - accessToken: []
    delete:
      tags:
      - billing
      summary: Delete billing account
      description: Deletes a billing account
      operationId: deleteBillingAccount
      parameters:
      - name: billingAccountId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteBillingAccount 200 response
      security:
      - accessToken: []
  /discussions:
    get:
      tags:
      - feed
      summary: Get discussions for an entity
      description: Retrieves a paginated list of discussions for a specific entity
        type and ID
      operationId: getDiscussionsForEntity
      parameters:
      - name: entityType
        in: query
        required: true
        explode: false
        schema:
          $ref: "#/components/schemas/EntityType"
      - name: entityId
        in: query
        required: true
        explode: false
        schema:
          type: string
      - name: nextToken
        in: query
        description: cursor for the next page of results
        explode: false
        schema:
          type: string
          nullable: true
      - name: limit
        in: query
        description: number of records to get
        required: false
        explode: false
        schema:
          type: integer
          format: int32
          default: 5000
      - name: order
        in: query
        description: "Sort order for the results, default is ascending order"
        explode: false
        schema:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          description: getDiscussionsForEntity 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_Discussion_"
      security:
      - accessToken: []
    post:
      tags:
      - feed
      summary: Create a discussion
      description: Creates a new discussion for an entity
      operationId: createDiscussion
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscussionInput"
        required: true
      responses:
        "200":
          description: createDiscussion 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
      security:
      - accessToken: []
  /discussions/{discussionId}:
    get:
      tags:
      - feed
      summary: Get a discussion
      description: Retrieves a discussion by its ID
      operationId: getDiscussion
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getDiscussion 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discussion"
      security:
      - accessToken: []
    put:
      tags:
      - feed
      summary: Update a discussion
      description: Updates an existing discussion with new details
      operationId: updateDiscussion
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscussionInput"
        required: true
      responses:
        "200":
          description: updateDiscussion 200 response
      security:
      - accessToken: []
    delete:
      tags:
      - feed
      summary: Delete a discussion
      description: Deletes an existing discussion and all associated messages
      operationId: deleteDiscussion
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteDiscussion 200 response
      security:
      - accessToken: []
  /discussions/{discussionId}/messages:
    get:
      tags:
      - feed
      summary: Get messages for a discussion
      description: Retrieves all messages associated with a specific discussion
      operationId: getMessagesForDiscussion
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      - name: nextToken
        in: query
        description: cursor for the next page of results
        explode: false
        schema:
          type: string
          nullable: true
      - name: limit
        in: query
        description: number of records to get
        required: false
        explode: false
        schema:
          type: integer
          format: int32
          default: 5000
      - name: threadId
        in: query
        description: Optional thread ID to filter messages by a specific thread
        explode: false
        schema:
          type: string
          nullable: true
      - name: order
        in: query
        description: "Sort order for the results, default is ascending order"
        explode: false
        schema:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          description: getMessagesForDiscussion 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_Message_"
      security:
      - accessToken: []
    post:
      tags:
      - feed
      summary: Post a message
      description: Posts a new message to a discussion
      operationId: postMessage
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
        required: true
      responses:
        "200":
          description: postMessage 200 response
      security:
      - accessToken: []
  /discussions/{discussionId}/messages/{messageId}:
    put:
      tags:
      - feed
      summary: Update a message
      description: Updates an existing message in a discussion
      operationId: updateMessage
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      - name: messageId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
        required: true
      responses:
        "200":
          description: updateMessage 200 response
      security:
      - accessToken: []
    delete:
      tags:
      - feed
      summary: Delete a message
      description: Deletes a message from a discussion
      operationId: deleteMessage
      parameters:
      - name: discussionId
        in: path
        required: true
        schema:
          type: string
      - name: messageId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteMessage 200 response
      security:
      - accessToken: []
  /governance/classifications:
    get:
      tags:
      - governance
      summary: Get classifications
      description: Retrieve a list of data classifications
      operationId: getClassifications
      responses:
        "200":
          description: getClassifications 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GovernanceClassification"
      security:
      - accessToken: []
    post:
      tags:
      - governance
      summary: Create classification
      description: Creates a classification
      operationId: createClassification
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassificationInput"
        required: true
      responses:
        "201":
          description: createClassification 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceClassification"
      security:
      - accessToken: []
  /governance/classifications/{classificationId}:
    get:
      tags:
      - governance
      summary: Get a classification
      description: Retrieve a data classification
      operationId: getClassification
      parameters:
      - name: classificationId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getClassification 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceClassification"
      security:
      - accessToken: []
    put:
      tags:
      - governance
      summary: Update classification
      description: Updates a classification
      operationId: updateClassification
      parameters:
      - name: classificationId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassificationInput"
        required: true
      responses:
        "200":
          description: updateClassification 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceClassification"
      security:
      - accessToken: []
    delete:
      tags:
      - governance
      summary: Delete a classification
      description: "Deletes the classification, and removes it from all projects."
      operationId: deleteClassification
      parameters:
      - name: classificationId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteClassification 200 response
      security:
      - accessToken: []
  /governance/contacts:
    get:
      tags:
      - governance
      summary: Get contacts
      description: Retrieve a list of governance contacts
      operationId: getContacts
      responses:
        "200":
          description: getContacts 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GovernanceContact"
      security:
      - accessToken: []
    post:
      tags:
      - governance
      summary: Create contact
      description: Creates a contact
      operationId: createContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
        required: true
      responses:
        "201":
          description: createContact 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceContact"
      security:
      - accessToken: []
  /governance/contacts/{contactId}:
    get:
      tags:
      - governance
      summary: Get a contact
      description: Retrieve a governance contact
      operationId: getContact
      parameters:
      - name: contactId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getContact 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceContact"
      security:
      - accessToken: []
    put:
      tags:
      - governance
      summary: Update contact
      description: Updates a contact
      operationId: updateContact
      parameters:
      - name: contactId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
        required: true
      responses:
        "200":
          description: updateContact 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceContact"
      security:
      - accessToken: []
    delete:
      tags:
      - governance
      summary: Delete a contact
      description: "Deletes the contact, and removes it from all governance requirements."
      operationId: deleteContact
      parameters:
      - name: contactId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteContact 200 response
      security:
      - accessToken: []
  /governance/projects/{projectId}/requirements:
    get:
      tags:
      - governance
      summary: Get project requirements
      description: Retrieve governance requirements for a project with fulfillment
        information for the current user
      operationId: getRequirementsByProject
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      - name: username
        in: query
        description: Username of the user to pull requirements for. Default is current
          user.
        required: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: getRequirementsByProject 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectRequirement"
      security:
      - accessToken: []
  /governance/projects/{projectId}/requirements/{requirementId}:fulfill:
    post:
      tags:
      - governance
      summary: Fulfill a project's requirement
      description: Saves a record of the fulfillment of a governance requirement
      operationId: fulfillRequirement
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      - name: requirementId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementFulfillmentInput"
        required: true
      responses:
        "200":
          description: fulfillRequirement 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FulfillmentResponse"
      security:
      - accessToken: []
  /governance/requirements:
    get:
      tags:
      - governance
      summary: Get requirements
      description: Retrieve a list of governance requirements
      operationId: getRequirements
      parameters:
      - name: projectId
        in: query
        description: Return requirements for project only
        required: false
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: getRequirements 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GovernanceRequirement"
      security:
      - accessToken: []
    post:
      tags:
      - governance
      summary: Create requirement
      description: Creates a requirement
      operationId: createRequirement
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementInput"
        required: true
      responses:
        "201":
          description: createRequirement 201 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceRequirement"
      security:
      - accessToken: []
  /governance/requirements/{requirementId}:
    get:
      tags:
      - governance
      summary: Get a requirement
      description: Retrieve a governance requirement
      operationId: getRequirement
      parameters:
      - name: requirementId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getRequirement 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceRequirement"
      security:
      - accessToken: []
    put:
      tags:
      - governance
      summary: Update requirement
      description: Updates a requirement
      operationId: updateRequirement
      parameters:
      - name: requirementId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementInput"
        required: true
      responses:
        "200":
          description: updateRequirement 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceRequirement"
      security:
      - accessToken: []
    delete:
      tags:
      - governance
      summary: Delete a requirement
      description: "Deletes the requirement, and removes it from all governance fulfillments\
        \ and classifications."
      operationId: deleteRequirement
      parameters:
      - name: requirementId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: deleteRequirement 200 response
      security:
      - accessToken: []
