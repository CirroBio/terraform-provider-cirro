        organization:
          type: string
        department:
          type: string
        jobTitle:
          type: string
        globalRoles:
          type: array
          items:
            type: string
    UserDetail:
      required:
      - email
      - globalRoles
      - name
      - organization
      - projectAssignments
      - settings
      - username
      type: object
      properties:
        username:
