        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
        organization:
          type: string
        orcidId:
          type: string
          nullable: true
        jobTitle:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        invitedBy:
          type: string
          nullable: true
        signUpTime:
          type: string
          format: date-time
          nullable: true
        lastSignedIn:
          type: string
          format: date-time
          nullable: true
        projectAssignments:
          type: array
          items:
            $ref: "#/components/schemas/UserProjectAssignment"
        globalRoles:
          type: array
          items:
            type: string
        groups:
          type: array
          description: Replaced by globalRoles.
          nullable: true
          deprecated: true
          items:
            type: string
        settings:
          $ref: "#/components/schemas/UserSettings"
    UserProjectAssignment:
      required:
      - createdBy
      - projectId
      - role
