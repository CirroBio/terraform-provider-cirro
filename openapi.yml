      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRowsRequest"
        required: true
      responses:
        "200":
          description: updateSheetData 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetDataUpdateResponse"
      security:
      - accessToken: []
  /projects/{projectId}/sheets/{sheetId}/data/query:
    post:
      tags:
      - sheets
      summary: Query sheet data
      description: "Returns paginated rows from a sheet. The first column is always\
        \ _row_id, which uniquely identifies each row and is required for row updates\
        \ via PUT. This is essentially a GET request disguised as a POST so we can\
        \ pass in a body."
      operationId: querySheetData
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      - name: sheetId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SheetDataRequest"
        required: true
      responses:
        "200":
          description: querySheetData 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetQueryResponse"
      security:
      - accessToken: []
  /projects/{projectId}/sheets/{sheetId}/ingest:
    post:
      tags:
      - sheets
      summary: Trigger ingest
      description: Triggers an async file ingest into the sheet
      operationId: triggerIngest
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      - name: sheetId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SheetIngestRequest"
        required: true
      responses:
        "202":
          description: triggerIngest 202 response
      security:
      - accessToken: []
  /projects/{projectId}/sheets/{sheetId}/jobs:
    get:
      tags:
      - sheets
      summary: List jobs
      description: Retrieves jobs for a sheet
      operationId: getJobs
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      - name: sheetId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: getJobs 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SheetJob"
      security:
      - accessToken: []
  /projects/{projectId}/sheets/{sheetId}:refresh:
    put:
      tags:
      - sheets
      summary: Refresh view
      description: Re-materializes a view from its source tables
      operationId: refreshView
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
      - name: sheetId
        in: path
        required: true
        schema:
          type: string
      responses:
        "202":
          description: refreshView 202 response
      security:
      - accessToken: []
components:
