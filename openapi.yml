      type: object
      properties:
        repositoryPath:
          minLength: 1
          pattern: "^[\\w-]+/[\\w-]+$"
          type: string
          description: GitHub repository which contains the workflow code
          example: nf-core/rnaseq
          x-pattern-message: Must be a valid repo <organization>/<repo>
        version:
          minLength: 1
          type: string
          description: "Branch, tag, or commit hash of the pipeline code"
          example: main
        repositoryType:
          $ref: "#/components/schemas/RepositoryType"
        entryPoint:
          minLength: 1
          type: string
          description: Main script for running the pipeline
          example: main.nf
        executorVersion:
          type: string
          description: Version of the executor
          nullable: true
          example: 24.10.5
      description: "Used to describe the pipeline analysis code, not required for\
        \ ingest processes"
    PipelineCost:
      type: object
      properties:
        totalCost:
          type: number
          description: The total cost of running the pipeline
          nullable: true
        isEstimate:
          type: boolean
          description: Is this an estimate of the cost?
        description:
          type: string
          description: Description of the cost calculation
