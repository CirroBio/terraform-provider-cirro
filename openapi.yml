    AppRegistrationInput:
      required:
      - allowedIps
      - clientType
      - description
      - globalPermissions
      - name
      - principalType
      - projectPermissions
      - redirectUris
      type: object
      properties:
        name:
          maxLength: 100
          minLength: 3
          pattern: "^\\w[\\w ().'&@!#-/]*$"
          type: string
          description: Name of app registration
          x-pattern-message: "Invalid name, must start with alphanumeric and include\
            \ only alphanumeric characters, spaces, and .&-@!#'()/"
        description:
          maxLength: 500
          type: string
        logoUrl:
          maxLength: 256
          pattern: "^https://[a-zA-Z0-9][a-zA-Z0-9\\-]*(\\.[a-zA-Z0-9][a-zA-Z0-9\\\
            -]*)+(/[^\\s]*)?$"
          type: string
          description: "Set a logo for the app, only available for administrators"
          nullable: true
          x-pattern-message: must be a valid HTTPS URL
        appUrl:
          maxLength: 100
          pattern: "^https://[a-zA-Z0-9][a-zA-Z0-9\\-]*(\\.[a-zA-Z0-9][a-zA-Z0-9\\\
            -]*)+(/[^\\s]*)?$"
          type: string
          description: Set a link for more information on the app
          nullable: true
          x-pattern-message: must be a valid HTTPS URL
        publisher:
          maxLength: 75
          type: string
          description: "Set a publisher display name, only available for administrators"
          nullable: true
        principalType:
          description: Whether it is linked to a user or it's own identity
          allOf:
          - $ref: "#/components/schemas/PrincipalType"
        clientType:
          description: Application client type
          allOf:
          - $ref: "#/components/schemas/AppClientType"
        allowedIps:
          type: array
          description: These IP address ranges are allowed to use this app (will be
            used later)
          items:
            type: string
        redirectUris:
          type: array
          description: A list of allowed redirect URIs for authentication. HTTPS is
            required except for localhost and app callback URLs are supported
          items:
            type: string
        secretExpiresAt:
          type: string
          description: Optional expiry date of secret
          format: date-time
          nullable: true
        projectPermissions:
          type: array
          description: Permissions that this app has on the project
          items:
            $ref: "#/components/schemas/ProjectPermissionSet"
        globalPermissions:
          type: array
          description: Permissions that this app has globally
          items:
            $ref: "#/components/schemas/Permission"
